<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200"><defs><style>@keyframes rotate{0%{transform:rotate(0deg)}}.bg{fill:#fff}.hour-hand,.minute-hand{fill:#888}.second-hand{fill:red}.center-dot{fill:#888}.clock-border{fill:none;stroke:#888;stroke-width:4}#secondHand{animation:rotate 5s linear infinite;transform-origin:50% 50%}</style></defs><circle cx="100" cy="100" r="95" class="bg"/><circle cx="100" cy="100" r="95" class="clock-border"/><rect id="hourHand" width="6" height="50" x="97" y="50" stroke-linecap="round" class="hour-hand"/><rect id="minuteHand" width="4" height="70" x="98" y="30" stroke-linecap="round" class="minute-hand"/><rect id="secondHand" width="2" height="80" x="99" y="20" stroke-linecap="round" class="second-hand"/><circle cx="100" cy="100" r="5" class="center-dot"/></svg>